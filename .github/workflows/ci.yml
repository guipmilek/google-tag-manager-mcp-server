name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/protected-gtm-mutations

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint protected implementation
        run: >-
          npx eslint
          src/index.ts
          src/safety
          src/protectedMutation
          src/tools/protectedMutationActions.ts
          src/tools/protectedVersionActions.ts
          src/tools/protectedPublishActions.ts
          src/tools/safetyActions.ts
