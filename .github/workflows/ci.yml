name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/protected-gtm-mutations

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format final protected version implementation
        if: github.event_name == 'pull_request'
        run: npx eslint --fix src/tools/protectedVersionActions.ts

      - name: Commit formatting
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tools/protectedVersionActions.ts
          git commit -m "style: format protected version workflow"
          git push origin HEAD:${{ github.head_ref }}

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint protected implementation
        run: >-
          npx eslint
          src/index.ts
          src/safety
          src/protectedMutation
          src/tools/protectedMutationActions.ts
          src/tools/protectedVersionActions.ts
          src/tools/protectedPublishActions.ts
          src/tools/safetyActions.ts
