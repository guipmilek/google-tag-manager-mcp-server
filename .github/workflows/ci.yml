name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/protected-gtm-mutations

permissions:
  contents: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Apply create-version verification patch
        if: github.event_name == 'pull_request'
        shell: python
        run: |
          from pathlib import Path

          path = Path("src/tools/protectedVersionActions.ts")
          text = path.read_text()

          if "workspaceDeletionVerification" in text:
              print("Patch already applied.")
              raise SystemExit(0)

          text = text.replace(
              '  mergeConflictCount: number;\n  requestBody: { name?: string; notes?: string };',
              '  mergeConflictCount: number;\n  deletesWorkspace: true;\n  requestBody: { name?: string; notes?: string };',
          )
          text = text.replace(
              '    mergeConflictCount: mergeConflict.length,\n    requestBody: {',
              '    mergeConflictCount: mergeConflict.length,\n    deletesWorkspace: true,\n    requestBody: {',
          )
          text = text.replace(
              '                  action: "createVersion",\n                  publishes_container: false,',
              '                  action: "createVersion",\n                  deletes_workspace: true,\n                  publishes_container: false,',
          )

          old = '''        let verification: Record<string, unknown> = {
          performed: false,
          verified: false,
        };

        if (versionId) {
          const versionPath = `accounts/${accountId}/containers/${containerId}/versions/${versionId}`;
          try {
            const readBack = await client.accounts.containers.versions.get({
              path: versionPath,
            });
            verification = {
              performed: true,
              verified: true,
              resource_name: versionPath,
              fingerprint: readBack.data?.fingerprint || null,
              published: false,
            };
          } catch (error) {
            verification = {
              performed: true,
              verified: false,
              resource_name: versionPath,
              warning: errorMessage(error),
              published: false,
            };
          }
        }
'''
          new = '''        let versionVerification: Record<string, unknown> = {
          performed: false,
          verified: false,
        };

        if (versionId) {
          const versionPath = `accounts/${accountId}/containers/${containerId}/versions/${versionId}`;
          try {
            const readBack = await client.accounts.containers.versions.get({
              path: versionPath,
            });
            versionVerification = {
              performed: true,
              verified: true,
              resource_name: versionPath,
              fingerprint: readBack.data?.fingerprint || null,
              published: false,
            };
          } catch (error) {
            versionVerification = {
              performed: true,
              verified: false,
              resource_name: versionPath,
              warning: errorMessage(error),
              published: false,
            };
          }
        }

        let workspaceDeletionVerification: Record<string, unknown>;
        try {
          await client.accounts.containers.workspaces.get({
            path: plan.workspacePath,
          });
          workspaceDeletionVerification = {
            performed: true,
            expected: "NOT_FOUND_AFTER_CREATE_VERSION",
            observed: "STILL_READABLE",
            verified: false,
          };
        } catch (error) {
          const message = errorMessage(error);
          const notFound = /404|not found/i.test(message);
          workspaceDeletionVerification = {
            performed: true,
            expected: "NOT_FOUND_AFTER_CREATE_VERSION",
            observed: notFound ? "NOT_FOUND" : "READ_FAILED",
            verified: notFound,
            warning: notFound ? null : message,
          };
        }
'''
          if old not in text:
              raise SystemExit("Expected create-version verification block was not found.")
          text = text.replace(old, new)
          text = text.replace(
              '                    compilerError || verification.verified !== true',
              '                    compilerError ||\n                    versionVerification.verified !== true ||\n                    workspaceDeletionVerification.verified !== true',
          )
          text = text.replace(
              '                  published: false,\n                  response: response.data,\n                  post_execution_verification: verification,',
              '                  deletes_workspace: true,\n                  published: false,\n                  response: response.data,\n                  post_execution_verification: {\n                    version: versionVerification,\n                    workspace_deletion: workspaceDeletionVerification,\n                  },',
          )
          path.write_text(text)

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Format final patch
        if: github.event_name == 'pull_request'
        run: npx eslint --fix src/tools/protectedVersionActions.ts

      - name: Commit final patch
        if: github.event_name == 'pull_request'
        run: |
          if git diff --quiet; then
            echo "No patch changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/tools/protectedVersionActions.ts
          git commit -m "fix(gtm): verify workspace deletion after version creation"
          git push origin HEAD:${{ github.head_ref }}

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint protected implementation
        run: >-
          npx eslint
          src/index.ts
          src/safety
          src/protectedMutation
          src/tools/protectedMutationActions.ts
          src/tools/protectedVersionActions.ts
          src/tools/protectedPublishActions.ts
          src/tools/safetyActions.ts
