name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/protected-gtm-mutations

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint > lint.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload lint diagnostics
        if: steps.lint.outputs.exit_code != '0'
        uses: actions/upload-artifact@v4
        with:
          name: lint-diagnostics
          path: lint.log

      - name: Fail when lint fails
        if: steps.lint.outputs.exit_code != '0'
        run: |
          cat lint.log
          exit 1
