name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python-horizon:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Horizon runtime
        run: python -m pip install -e .

      - name: Run Python safety tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python runtime
        run: python -m compileall gtm_mcp horizon_server.py

      - name: Inspect FastMCP entrypoint
        run: fastmcp inspect horizon_server.py:mcp

  typescript-reference:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build and run TypeScript safety tests
        run: npm test

      - name: Lint protected TypeScript implementation
        run: >-
          npx eslint
          src/index.ts
          src/safety
          src/protectedMutation
          src/tools/protectedMutationActions.ts
          src/tools/protectedVersionActions.ts
          src/tools/protectedPublishActions.ts
          src/tools/safetyActions.ts
